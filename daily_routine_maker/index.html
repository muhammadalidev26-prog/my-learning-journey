<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Day Planner</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #141414;
            --bg2: #1e1e1e;
            --bg3: #272727;
            --bg4: #303030;
            --border: #333;
            --border2: #444;
            --text: #ddd;
            --muted: #666;
            --muted2: #888;
            --accent: #5b8dee;
            --accent2: #3a6fd8;
            --green: #3dba6e;
            --red: #e05555;
            --amber: #d4922a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            min-height: 100vh;
            padding: 24px 16px 48px
        }

        .wrap {
            max-width: 680px;
            margin: 0 auto
        }

        /* header */
        .header {
            text-align: center;
            margin-bottom: 24px
        }

        .header h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: var(--text)
        }

        .header .day {
            font-size: 13px;
            color: var(--muted2);
            margin-top: 4px
        }

        /* stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px
        }

        .stat {
            background: var(--bg2);
            border: 0.5px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center
        }

        .stat-val {
            font-size: 20px;
            font-weight: 500;
            font-family: 'IBM Plex Mono', monospace
        }

        .stat-lbl {
            font-size: 11px;
            color: var(--muted2);
            margin-top: 3px
        }

        .progress-wrap {
            margin-bottom: 20px
        }

        .progress-bar {
            height: 3px;
            background: var(--bg3);
            border-radius: 2px
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--green);
            transition: width .4s ease
        }

        .progress-label {
            font-size: 11px;
            color: var(--muted);
            text-align: right;
            margin-top: 4px;
            font-family: 'IBM Plex Mono', monospace
        }

        /* toolbar */
        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 16px
        }

        .toolbar-left {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap
        }

        .add-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 9px 16px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background .15s
        }

        .add-btn:hover {
            background: var(--accent2)
        }

        .filter-btn {
            background: var(--bg2);
            border: 0.5px solid var(--border);
            color: var(--muted2);
            padding: 8px 12px;
            border-radius: 7px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: all .15s
        }

        .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(91, 141, 238, .08)
        }

        .sort-sel {
            background: var(--bg2);
            border: 0.5px solid var(--border);
            border-radius: 7px;
            color: var(--muted2);
            padding: 8px 10px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            outline: none
        }

        /* save indicator */
        .save-row {
            text-align: center;
            height: 18px;
            margin-bottom: 8px
        }

        .save-ind {
            font-size: 11px;
            color: var(--green);
            font-family: 'IBM Plex Mono', monospace;
            opacity: 0;
            transition: opacity .3s
        }

        .save-ind.show {
            opacity: 1
        }

        /* task cards */
        .task-card {
            background: var(--bg2);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            cursor: grab;
            transition: border-color .2s, opacity .2s
        }

        .task-card:active {
            cursor: grabbing
        }

        .task-card.done {
            opacity: .45
        }

        .task-card.dragging {
            opacity: .25;
            border-style: dashed
        }

        .task-card.drag-over {
            border-color: var(--accent)
        }

        .color-bar {
            width: 3px;
            border-radius: 2px;
            align-self: stretch;
            flex-shrink: 0;
            min-height: 36px
        }

        .task-body {
            flex: 1;
            min-width: 0
        }

        .task-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        .task-card.done .task-name {
            text-decoration: line-through;
            color: var(--muted2)
        }

        .dur-badge {
            font-size: 11px;
            background: var(--bg3);
            color: var(--muted2);
            padding: 2px 7px;
            border-radius: 20px;
            font-family: 'IBM Plex Mono', monospace;
            white-space: nowrap
        }

        .task-time {
            font-size: 12px;
            color: var(--muted2);
            margin-top: 4px;
            font-family: 'IBM Plex Mono', monospace
        }

        .task-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 5px;
            background: var(--bg3);
            color: var(--muted2)
        }

        .task-note {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
            font-style: italic;
            line-height: 1.5
        }

        .task-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0
        }

        .icon-btn {
            background: none;
            border: 0.5px solid var(--border);
            border-radius: 6px;
            color: var(--muted2);
            cursor: pointer;
            padding: 5px 8px;
            font-size: 13px;
            transition: background .12s, color .12s;
            line-height: 1
        }

        .icon-btn:hover {
            background: var(--bg3);
            color: var(--text)
        }

        .icon-btn.done-active {
            color: var(--green);
            border-color: var(--green)
        }

        .icon-btn.del-btn:hover {
            color: var(--red);
            border-color: var(--red)
        }

        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7
        }

        /* modal */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 16px
        }

        .modal {
            background: var(--bg2);
            border: 0.5px solid var(--border2);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 420px
        }

        .modal h2 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 18px;
            font-family: 'IBM Plex Mono', monospace
        }

        .field {
            margin-bottom: 14px
        }

        .field label {
            display: block;
            font-size: 11px;
            color: var(--muted2);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            background: var(--bg3);
            border: 0.5px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            padding: 9px 11px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color .15s
        }

        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            border-color: var(--accent)
        }

        .field select option {
            background: var(--bg3)
        }

        .field textarea {
            resize: vertical;
            min-height: 60px;
            line-height: 1.5
        }

        .time-row {
            display: grid;
            grid-template-columns: 1fr 24px 1fr;
            gap: 6px;
            align-items: center
        }

        .time-row span {
            text-align: center;
            color: var(--muted);
            font-size: 12px
        }

        .color-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 2px
        }

        .swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color .12s, transform .12s
        }

        .swatch:hover {
            transform: scale(1.15)
        }

        .swatch.sel {
            border-color: #fff
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 18px
        }

        .btn {
            padding: 9px 18px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: opacity .15s
        }

        .btn-primary {
            background: var(--accent);
            color: #fff
        }

        .btn-primary:hover {
            opacity: .85
        }

        .btn-ghost {
            background: var(--bg3);
            color: var(--muted2);
            border: 0.5px solid var(--border)
        }

        .btn-ghost:hover {
            color: var(--text)
        }

        /* confirm dialog */
        .confirm-box {
            background: var(--bg2);
            border: 0.5px solid var(--border2);
            border-radius: 10px;
            padding: 20px;
            max-width: 320px;
            width: 100%;
            text-align: center
        }

        .confirm-box p {
            font-size: 13px;
            color: var(--muted2);
            margin-bottom: 16px;
            line-height: 1.5
        }

        .confirm-box .btns {
            display: flex;
            gap: 8px;
            justify-content: center
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
            padding: 8px 16px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-family: inherit
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <h1>Day Planner</h1>
            <div class="day" id="day-label"></div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="s-total">0</div>
                <div class="stat-lbl">Total</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="s-done" style="color:var(--green)">0</div>
                <div class="stat-lbl">Done</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="s-hours" style="color:var(--accent)">0h</div>
                <div class="stat-lbl">Planned</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="s-left" style="color:var(--amber)">0</div>
                <div class="stat-lbl">Remaining</div>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill" id="prog" style="width:0%"></div>
            </div>
            <div class="progress-label" id="prog-label">0%</div>
        </div>

        <div class="toolbar">
            <div class="toolbar-left">
                <button class="add-btn" onclick="openModal()">+ Add Task</button>
                <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
                <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
            </div>
            <select class="sort-sel" onchange="setSort(this.value)">
                <option value="order">Custom order</option>
                <option value="time">Start time</option>
                <option value="duration">Duration</option>
            </select>
        </div>

        <div class="save-row"><span class="save-ind" id="save-ind">✓ Saved</span></div>
        <div id="tasks-list"></div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="overlay" id="modal" style="display:none" onclick="overlayClick(event)">
        <div class="modal">
            <h2 id="modal-title">Add task</h2>
            <div class="field"><label>Task name</label><input id="f-name" placeholder="e.g. Deep work session" /></div>
            <div class="field">
                <label>Time block</label>
                <div class="time-row">
                    <input type="time" id="f-start" value="09:00" />
                    <span>–</span>
                    <input type="time" id="f-end" value="10:00" />
                </div>
            </div>
            <div class="field">
                <label>Category</label>
                <select id="f-tag">
                    <option value="">— none —</option>
                    <option value="Work">Work</option>
                    <option value="Health">Health</option>
                    <option value="Personal">Personal</option>
                    <option value="Learning">Learning</option>
                    <option value="Break">Break</option>
                    <option value="Meeting">Meeting</option>
                </select>
            </div>
            <div class="field"><label>Note (optional)</label><textarea id="f-note"
                    placeholder="Any details…"></textarea></div>
            <div class="field">
                <label>Color</label>
                <div class="color-row" id="color-row"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTask()">Save</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete -->
    <div class="overlay" id="confirm-overlay" style="display:none" onclick="confirmOverlayClick(event)">
        <div class="confirm-box">
            <p>Delete this task? This cannot be undone.</p>
            <div class="btns">
                <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const COLORS = ['#5b8dee', '#3dba6e', '#e05555', '#d4922a', '#8b6de8', '#e06fa0', '#3abcb5', '#aaaaaa'];
        const STORAGE_KEY = 'dayplanner_tasks_v1';
        let tasks = [];
        let editId = null;
        let deleteId = null;
        let dragSrc = null;
        let selColor = COLORS[0];
        let filter = 'all';
        let sort = 'order';

        // ── Persistence ──────────────────────────────────────────
        function load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                tasks = raw ? JSON.parse(raw) : [];
            } catch (e) { tasks = []; }
        }
        function save() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
                flash();
            } catch (e) { }
        }
        function flash() {
            const el = document.getElementById('save-ind');
            el.classList.add('show');
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove('show'), 1800);
        }

        // ── Helpers ───────────────────────────────────────────────
        function fmtDate(d) { return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) }
        function fmtTime(t) { if (!t) return ''; const [h, m] = t.split(':'); const hr = +h; return `${hr % 12 || 12}:${m}${hr >= 12 ? 'pm' : 'am'}` }
        function minDiff(s, e) { if (!s || !e) return 0; const [sh, sm] = s.split(':').map(Number); const [eh, em] = e.split(':').map(Number); return (eh * 60 + em) - (sh * 60 + sm) }
        function fmtDur(m) { if (m <= 0) return ''; if (m < 60) return m + 'm'; const h = Math.floor(m / 60), r = m % 60; return r ? `${h}h ${r}m` : `${h}h` }

        // ── Color picker ──────────────────────────────────────────
        function buildColors(sel) {
            const el = document.getElementById('color-row');
            el.innerHTML = '';
            COLORS.forEach(c => {
                const d = document.createElement('div');
                d.className = 'swatch' + (c === sel ? ' sel' : '');
                d.style.background = c;
                d.onclick = () => { selColor = c; buildColors(c) };
                el.appendChild(d);
            });
        }

        // ── Modal ─────────────────────────────────────────────────
        function openModal(id = null) {
            editId = id;
            if (id != null) {
                const t = tasks.find(x => x.id === id);
                document.getElementById('modal-title').textContent = 'Edit task';
                document.getElementById('f-name').value = t.name;
                document.getElementById('f-start').value = t.start;
                document.getElementById('f-end').value = t.end;
                document.getElementById('f-tag').value = t.tag || '';
                document.getElementById('f-note').value = t.note || '';
                selColor = t.color || COLORS[0];
            } else {
                document.getElementById('modal-title').textContent = 'Add task';
                document.getElementById('f-name').value = '';
                document.getElementById('f-start').value = '09:00';
                document.getElementById('f-end').value = '10:00';
                document.getElementById('f-tag').value = '';
                document.getElementById('f-note').value = '';
                selColor = COLORS[tasks.length % COLORS.length];
            }
            buildColors(selColor);
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => document.getElementById('f-name').focus(), 60);
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; editId = null; }
        function overlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }

        function saveTask() {
            const name = document.getElementById('f-name').value.trim();
            if (!name) return;
            const t = {
                id: editId != null ? editId : Date.now(),
                name,
                start: document.getElementById('f-start').value,
                end: document.getElementById('f-end').value,
                tag: document.getElementById('f-tag').value,
                note: document.getElementById('f-note').value.trim(),
                color: selColor,
                done: editId != null ? (tasks.find(x => x.id === editId) || {}).done || false : false,
                order: editId != null ? (tasks.find(x => x.id === editId) || {}).order || tasks.length : tasks.length
            };
            tasks = editId != null ? tasks.map(x => x.id === editId ? t : x) : [...tasks, t];
            closeModal(); save(); render();
        }

        // ── Delete confirm ────────────────────────────────────────
        function askDelete(id) { deleteId = id; document.getElementById('confirm-overlay').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('confirm-overlay').style.display = 'none'; deleteId = null; }
        function confirmOverlayClick(e) { if (e.target === document.getElementById('confirm-overlay')) closeConfirm(); }
        function confirmDelete() { if (deleteId != null) { tasks = tasks.filter(x => x.id !== deleteId); save(); render(); } closeConfirm(); }

        // ── Toggle done ───────────────────────────────────────────
        function toggleDone(id) { tasks = tasks.map(x => x.id === id ? { ...x, done: !x.done } : x); save(); render(); }

        // ── Filter / Sort ─────────────────────────────────────────
        function setFilter(m, btn) {
            filter = m;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }
        function setSort(v) { sort = v; render(); }

        function getList() {
            let list = [...tasks];
            if (filter === 'done') list = list.filter(x => x.done);
            else if (filter === 'pending') list = list.filter(x => !x.done);
            if (sort === 'time') list.sort((a, b) => a.start.localeCompare(b.start));
            else if (sort === 'duration') list.sort((a, b) => minDiff(b.start, b.end) - minDiff(a.start, a.end));
            else list.sort((a, b) => a.order - b.order);
            return list;
        }

        // ── Stats ─────────────────────────────────────────────────
        function updateStats() {
            const total = tasks.length, done = tasks.filter(x => x.done).length;
            const mins = tasks.reduce((s, t) => { const d = minDiff(t.start, t.end); return s + (d > 0 ? d : 0); }, 0);
            document.getElementById('s-total').textContent = total;
            document.getElementById('s-done').textContent = done;
            document.getElementById('s-hours').textContent = fmtDur(mins) || '0h';
            document.getElementById('s-left').textContent = tasks.filter(x => !x.done).length;
            const pct = total ? Math.round((done / total) * 100) : 0;
            document.getElementById('prog').style.width = pct + '%';
            document.getElementById('prog-label').textContent = pct + '%';
        }

        // ── Render ────────────────────────────────────────────────
        function render() {
            updateStats();
            const list = getList();
            const el = document.getElementById('tasks-list');
            if (!list.length) {
                el.innerHTML = '<div class="empty">No tasks yet.<br>Hit "+ Add Task" to start planning your day.</div>';
                return;
            }
            el.innerHTML = '';
            list.forEach(t => {
                const dur = minDiff(t.start, t.end);
                const card = document.createElement('div');
                card.className = 'task-card' + (t.done ? ' done' : '');
                card.draggable = true;
                card.dataset.id = t.id;
                card.innerHTML = `
        <div class="color-bar" style="background:${t.color || 'var(--accent)'}"></div>
        <div class="task-body">
        <div class="task-name">
            ${escHtml(t.name)}
            ${dur > 0 ? `<span class="dur-badge">${fmtDur(dur)}</span>` : ''}
        </div>
        <div class="task-time">${fmtTime(t.start)}${t.end ? ' – ' + fmtTime(t.end) : ''}</div>
        ${t.tag ? `<span class="task-tag">${escHtml(t.tag)}</span>` : ''}
        ${t.note ? `<div class="task-note">${escHtml(t.note)}</div>` : ''}
        </div>
        <div class="task-actions">
        <button class="icon-btn ${t.done ? 'done-active' : ''}" title="${t.done ? 'Undo' : 'Mark done'}" onclick="toggleDone(${t.id})">✓</button>
        <button class="icon-btn" title="Edit" onclick="openModal(${t.id})">✎</button>
        <button class="icon-btn del-btn" title="Delete" onclick="askDelete(${t.id})">✕</button>
        </div>`;
                // drag
                card.addEventListener('dragstart', e => { dragSrc = t.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
                card.addEventListener('dragend', () => { card.classList.remove('dragging'); document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over')); });
                card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
                card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
                card.addEventListener('drop', e => {
                    e.preventDefault(); card.classList.remove('drag-over');
                    if (dragSrc === t.id) return;
                    const si = tasks.findIndex(x => x.id === dragSrc), di = tasks.findIndex(x => x.id === t.id);
                    const moved = tasks.splice(si, 1)[0];
                    tasks.splice(di, 0, moved);
                    tasks.forEach((x, i) => x.order = i);
                    sort = 'order';
                    save(); render();
                });
                el.appendChild(card);
            });
        }

        function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }

        // ── Init ──────────────────────────────────────────────────
        document.getElementById('day-label').textContent = fmtDate(new Date());
        load();
        render();
    </script>
</body>

</html>
