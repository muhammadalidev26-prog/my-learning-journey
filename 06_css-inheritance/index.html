<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Inheritance Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="parent">
        I am the Parent (Blue text, solid border)

        <div class="box box-inherit">1. Inherit: I mimic my parent.</div>
        
        <div class="box box-initial">2. Initial: I go to CSS defaults.</div>
        
        <div class="box box-unset">3. Unset: I'm a hybrid.</div>
        
        <div class="box box-revert">4. Revert: I want to be a normal div.</div>
        
        <h2 class="box box-revert-h2">5. Revert (H2): I go back to Browser default.</h2>
    </div>

</body>
</html>
