<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CSS box Model</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="box-one">One</div>
        <div class="box-two">Two</div>
        <span class="box-three">Three</span>

        <p class="block-boxes">I'm a Block! I take the whole row.</p>
        <p class="block-boxes">I'm also a Block!</p>
        
        <span class="inline-boxes">I'm Inline.</span>
        <span class="inline-boxes">Me too! We're buddies.</span>
        
        <div class="content-box">Standard Box Model</div>
        <div class="border-box">Alternative Box Model</div>
        <p class="note"><strong>Note:</strong>Both of the boxes' widths are 500px but content-box and border-box handles it differently</p>
    </body>
</html>
