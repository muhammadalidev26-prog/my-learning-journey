<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Floating Card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }

        .box {
            width: 200px;
            height: 150px;
            background-color: lightblue;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border-radius: 10px;

            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.10);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .box:hover {
            box-shadow: 0px 12px 28px rgba(0, 0, 0, 0.20);
            transform: translateY(-4px);
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Box</h2>
        <p>This is a box</p>
    </div>
    
</body>

</html>
